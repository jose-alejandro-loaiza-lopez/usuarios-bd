services:
  postgres:
    image: 'postgres:latest'
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-usuarios}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-devdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '5432'

  usuarios-service:
    image: joseloaiza01/usuarios-bd-1.0:latest
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-usuarios}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-devdb}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JPA_DDL=update
      - PORT=8080

volumes:
  postgres_data: